# Netlify configuration for the Frontbits static site.
# The marketing pages have no build step. The one exception is the admin
# CRM in admin-src/, a Vite + React app that builds into ./admin and is
# served at /admin -- the build command below compiles just that, then the
# repo root (now including the built admin/ folder) is published as-is.
#
# Requires VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY to be set under
# Site settings -> Environment variables in the Netlify UI, since Vite
# inlines them at build time.

[build]
  publish = "."
  command = "cd admin-src && npm install && npm run build"

# Long-cache the fingerprinted/static assets (HTML stays revalidated).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/projects/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/admin/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# The admin app is a client-side-routed SPA -- any deep link under /admin
# (e.g. /admin/leads) must resolve to its index.html so React Router can
# take over. Scoped to /admin only; every other path on the site is a real
# static file and is unaffected.
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Sensible security headers for a static marketing site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
