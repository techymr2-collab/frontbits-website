  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"ca754347-3b1b-4451-8906-ce4db3c9ac1b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"7b97f857-c13e-4ec2-a243-ac1df6bd90c5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ca754347-3b1b-4451-8906-ce4db3c9ac1b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"7b97f857-c13e-4ec2-a243-ac1df6bd90c5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* Brand palette */\n  --teal:        #3FA9C9;\n  --teal-600:    #2F93B2;\n  --teal-700:    #237C98;\n  --teal-ink:    #1B5163;   /* deep teal for headings on light */\n  --teal-tint:   #EAF6F9;   /* soft section wash */\n  --teal-tint-2: #DCEFF4;\n  --teal-line:   #CFE7EE;\n\n  --coral:       #FF8A6B;\n  --coral-600:   #F4724F;\n  --coral-700:   #E45F3B;\n  --coral-tint:  #FFEDE6;\n\n  /* Neutrals */\n  --white:   #FFFFFF;\n  --paper:   #FBFDFE;   /* very faint cool white page bg */\n  --ink:     #173039;   /* primary text */\n  --ink-2:   #46606A;   /* secondary text */\n  --ink-3:   #7C949D;   /* muted / captions */\n  --grey-50: #F4F8FA;\n  --grey-100:#EAF0F3;\n  --line:    #E2EBEF;   /* hairline borders */\n\n  /* Radius (review default 16px) */\n  --r-sm: 10px;\n  --r:    16px;\n  --r-lg: 24px;\n  --r-xl: 32px;\n  --r-pill: 999px;\n\n  /* Shadows — gentle, diffuse */\n  --sh-sm: 0 2px 8px rgba(27, 81, 99, 0.06);\n  --sh:    0 8px 24px rgba(27, 81, 99, 0.08);\n  --sh-md: 0 16px 40px rgba(27, 81, 99, 0.10);\n  --sh-lg: 0 28px 64px rgba(27, 81, 99, 0.14);\n  --sh-coral: 0 10px 24px rgba(244, 114, 79, 0.30);\n\n  /* Layout */\n  --maxw: 1200px;\n  --gut: 24px;\n  --header-h: 76px;\n\n  --ease: cubic-bezier(.4,.1,.2,1);\n}\n\n* { box-sizing: border-box; }\n\nhtml { scroll-behavior: smooth; scroll-padding-top: calc(var(--header-h) + 16px); }\n\nbody {\n  margin: 0;\n  font-family: 'DM Sans', system-ui, sans-serif;\n  color: var(--ink);\n  background: var(--paper);\n  line-height: 1.6;\n  -webkit-font-smoothing: antialiased;\n  font-optical-sizing: auto;\n}\n\nimg { max-width: 100%; display: block; }\na { color: inherit; text-decoration: none; }\n\nh1, h2, h3, h4 {\n  margin: 0;\n  line-height: 1.1;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n  font-weight: 700;\n  text-wrap: balance;\n}\np { margin: 0; }\n\n/* ---- Typographic scale ---- */\n.display { font-size: clamp(40px, 5.2vw, 64px); line-height: 1.04; }\n.h1 { font-size: clamp(34px, 4vw, 48px); }\n.h2 { font-size: clamp(28px, 3vw, 38px); }\n.h3 { font-size: clamp(20px, 2vw, 24px); }\n.lead { font-size: clamp(17px, 1.4vw, 20px); color: var(--ink-2); line-height: 1.65; }\n.eyebrow {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-size: 13px; font-weight: 600; letter-spacing: 0.10em;\n  text-transform: uppercase; color: var(--teal-700);\n}\n.eyebrow::before {\n  content: \"\"; width: 22px; height: 2px; border-radius: 2px;\n  background: var(--coral);\n}\n.eyebrow.center { justify-content: center; }\n.muted { color: var(--ink-3); }\n\n/* ---- Layout helpers ---- */\n.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--gut); }\n.section { padding: clamp(64px, 8vw, 110px) 0; }\n.section.tight { padding: clamp(48px, 6vw, 80px) 0; }\n.bg-tint { background: var(--teal-tint); }\n.bg-grey { background: var(--grey-50); }\n.center { text-align: center; }\n.stack-sm > * + * { margin-top: 12px; }\n.stack > * + * { margin-top: 20px; }\n\n.sec-head { max-width: 640px; }\n.sec-head.center { margin: 0 auto; }\n.sec-head .h2 { margin-top: 14px; }\n.sec-head p { margin-top: 16px; }\n\n/* ============================================================\n   Buttons\n   ============================================================ */\n.btn {\n  --bg: var(--coral);\n  display: inline-flex; align-items: center; justify-content: center;\n  gap: 10px;\n  font: inherit; font-weight: 600; font-size: 16px;\n  padding: 14px 26px;\n  border-radius: var(--r-pill);\n  border: 1.5px solid transparent;\n  background: var(--bg);\n  color: #fff;\n  cursor: pointer;\n  transition: transform .18s var(--ease), box-shadow .25s var(--ease), background .2s var(--ease);\n  white-space: nowrap;\n}\n.btn svg { width: 18px; height: 18px; }\n.btn-primary { background: var(--coral); box-shadow: var(--sh-coral); }\n.btn-primary:hover { background: var(--coral-600); transform: translateY(-2px); box-shadow: 0 14px 30px rgba(244,114,79,.38); }\n.btn-teal { background: var(--teal); box-shadow: 0 10px 24px rgba(47,147,178,.28); }\n.btn-teal:hover { background: var(--teal-600); transform: translateY(-2px); }\n.btn-ghost {\n  background: #fff; color: var(--teal-ink); border-color: var(--teal-line);\n  box-shadow: var(--sh-sm);\n}\n.btn-ghost:hover { border-color: var(--teal); color: var(--teal-700); transform: translateY(-2px); }\n.btn-soft { background: var(--teal-tint); color: var(--teal-700); }\n.btn-soft:hover { background: var(--teal-tint-2); }\n.btn-lg { padding: 17px 32px; font-size: 17px; }\n.btn-sm { padding: 10px 18px; font-size: 14px; }\n.btn-block { width: 100%; }\n\n.link-arrow {\n  display: inline-flex; align-items: center; gap: 7px;\n  font-weight: 600; color: var(--teal-700); font-size: 15px;\n  transition: gap .2s var(--ease), color .2s var(--ease);\n}\n.link-arrow svg { width: 16px; height: 16px; transition: transform .2s var(--ease); }\n.link-arrow:hover { color: var(--coral-700); gap: 11px; }\n\n/* ============================================================\n   Header (sticky)\n   ============================================================ */\n.site-header {\n  position: sticky; top: 0; z-index: 80;\n  height: var(--header-h);\n  background: rgba(255,255,255,0.82);\n  backdrop-filter: saturate(140%) blur(14px);\n  border-bottom: 1px solid var(--line);\n  transition: box-shadow .25s var(--ease);\n}\n.site-header.scrolled { box-shadow: var(--sh-sm); }\n.header-inner {\n  max-width: var(--maxw); margin: 0 auto; padding: 0 var(--gut);\n  height: 100%; display: flex; align-items: center; gap: 28px;\n}\n.brand { display: inline-flex; align-items: center; gap: 11px; }\n.brand-mark {\n  width: 38px; height: 38px; border-radius: 12px;\n  background: linear-gradient(135deg, var(--teal) 0%, var(--teal-600) 100%);\n  display: grid; place-items: center;\n  box-shadow: 0 6px 16px rgba(47,147,178,.32);\n}\n.brand-mark svg { width: 22px; height: 22px; }\n.brand-name { font-size: 21px; font-weight: 700; letter-spacing: -0.02em; color: var(--ink); }\n.brand-name b { color: var(--teal-700); font-weight: 700; }\n\n.nav { display: flex; align-items: center; gap: 4px; margin-left: 6px; }\n.nav a {\n  font-size: 15px; font-weight: 500; color: var(--ink-2);\n  padding: 9px 14px; border-radius: var(--r-pill);\n  transition: color .18s var(--ease), background .18s var(--ease);\n}\n.nav a:hover { color: var(--teal-700); background: var(--teal-tint); }\n.nav a.active { color: var(--teal-700); background: var(--teal-tint); }\n\n.header-cta { margin-left: auto; display: flex; align-items: center; gap: 14px; }\n.phone-link {\n  display: inline-flex; align-items: center; gap: 9px;\n  font-weight: 600; color: var(--ink); font-size: 15px;\n}\n.phone-link .ph-ico {\n  width: 34px; height: 34px; border-radius: 50%;\n  background: var(--teal-tint); color: var(--teal-700);\n  display: grid; place-items: center; flex: none;\n}\n.phone-link .ph-ico svg { width: 16px; height: 16px; }\n.phone-link small { display: block; font-size: 11px; font-weight: 500; color: var(--ink-3); letter-spacing: .04em; text-transform: uppercase; line-height: 1; margin-bottom: 2px; }\n.phone-link b { font-size: 15px; font-weight: 700; line-height: 1; white-space: nowrap; }\n\n.menu-toggle { display: none; }\n.mobile-nav { display: none; }\n\n/* ============================================================\n   Cards — service, pillar, dentist, testimonial\n   ============================================================ */\n.card {\n  background: #fff;\n  border: 1px solid var(--line);\n  border-radius: var(--r-lg);\n  box-shadow: var(--sh-sm);\n}\n\n.grid { display: grid; gap: 24px; }\n.grid-3 { grid-template-columns: repeat(3, 1fr); }\n.grid-2 { grid-template-columns: repeat(2, 1fr); }\n.grid-4 { grid-template-columns: repeat(4, 1fr); }\n\n/* Service card */\n.svc {\n  padding: 30px 28px;\n  border-radius: var(--r-lg);\n  background: #fff;\n  border: 1px solid var(--line);\n  box-shadow: var(--sh-sm);\n  transition: transform .22s var(--ease), box-shadow .25s var(--ease), border-color .2s var(--ease);\n  display: flex; flex-direction: column; gap: 14px;\n}\n.svc:hover { transform: translateY(-4px); box-shadow: var(--sh-md); border-color: var(--teal-line); }\n.svc .ico {\n  width: 56px; height: 56px; border-radius: 16px;\n  background: var(--teal-tint); color: var(--teal-700);\n  display: grid; place-items: center;\n}\n.svc .ico svg { width: 28px; height: 28px; }\n.svc h3 { font-size: 20px; }\n.svc p { color: var(--ink-2); font-size: 15px; }\n.svc .link-arrow { margin-top: auto; }\n\n/* Pillar (why lumen) */\n.pillar { display: flex; flex-direction: column; gap: 14px; }\n.pillar .ico {\n  width: 60px; height: 60px; border-radius: 18px;\n  display: grid; place-items: center;\n  background: #fff; box-shadow: var(--sh-sm); color: var(--teal-700);\n}\n.pillar .ico svg { width: 28px; height: 28px; }\n.pillar h3 { font-size: 19px; }\n.pillar p { color: var(--ink-2); font-size: 15px; }\n\n/* Dentist card */\n.dentist {\n  border-radius: var(--r-lg); overflow: hidden; background: #fff;\n  border: 1px solid var(--line); box-shadow: var(--sh-sm);\n  transition: transform .22s var(--ease), box-shadow .25s var(--ease);\n}\n.dentist:hover { transform: translateY(-4px); box-shadow: var(--sh-md); }\n.dentist .photo { width: 100%; height: auto; aspect-ratio: 4 / 4.4; background: var(--teal-tint); }\n.dentist .body { padding: 22px 24px 26px; }\n.dentist .role { color: var(--coral-700); font-weight: 600; font-size: 13px; letter-spacing: .04em; text-transform: uppercase; }\n.dentist h3 { font-size: 21px; margin: 6px 0 10px; }\n.dentist p { color: var(--ink-2); font-size: 15px; }\n\n/* Testimonial */\n.quote {\n  padding: 32px 30px; border-radius: var(--r-lg); background: #fff;\n  border: 1px solid var(--line); box-shadow: var(--sh-sm);\n  display: flex; flex-direction: column; gap: 18px;\n}\n.stars { display: inline-flex; gap: 3px; color: #FFB23E; }\n.stars svg { width: 20px; height: 20px; }\n.quote blockquote { margin: 0; font-size: 18px; line-height: 1.6; color: var(--ink); font-weight: 500; }\n.quote .who { display: flex; align-items: center; gap: 13px; margin-top: auto; }\n.quote .who image-slot, .quote .who .avatar {\n  width: 46px; height: 46px; border-radius: 50%; flex: none; background: var(--teal-tint);\n}\n.quote .who b { display: block; font-size: 15px; }\n.quote .who span { font-size: 13px; color: var(--ink-3); }\n\n/* Badge / pill tags */\n.tag {\n  display: inline-flex; align-items: center; gap: 7px;\n  padding: 7px 14px; border-radius: var(--r-pill);\n  background: var(--teal-tint); color: var(--teal-700);\n  font-size: 13px; font-weight: 600;\n}\n.tag.coral { background: var(--coral-tint); color: var(--coral-700); }\n.hero-copy .tag { white-space: nowrap; }\n\n/* ============================================================\n   FAQ accordion\n   ============================================================ */\n.faq { border-top: 1px solid var(--line); }\n.faq-item { border-bottom: 1px solid var(--line); }\n.faq-q {\n  width: 100%; text-align: left; background: none; border: 0; cursor: pointer;\n  font: inherit; font-weight: 600; font-size: 18px; color: var(--ink);\n  padding: 24px 0; display: flex; align-items: center; gap: 20px;\n}\n.faq-q .plus {\n  margin-left: auto; flex: none; width: 32px; height: 32px; border-radius: 50%;\n  background: var(--teal-tint); color: var(--teal-700);\n  display: grid; place-items: center; transition: transform .25s var(--ease), background .2s var(--ease);\n}\n.faq-q .plus svg { width: 16px; height: 16px; }\n.faq-item.open .faq-q .plus { transform: rotate(45deg); background: var(--coral); color: #fff; }\n.faq-a { overflow: hidden; max-height: 0; transition: max-height .3s var(--ease); }\n.faq-a-inner { padding: 0 52px 26px 0; color: var(--ink-2); font-size: 16px; }\n\n/* ============================================================\n   Forms\n   ============================================================ */\n.field { display: flex; flex-direction: column; gap: 7px; }\n.field label { font-size: 14px; font-weight: 600; color: var(--ink); }\n.field .req { color: var(--coral-700); }\n.input, .select, .textarea {\n  font: inherit; font-size: 15px; color: var(--ink);\n  padding: 13px 16px; border-radius: var(--r);\n  border: 1.5px solid var(--line); background: #fff;\n  transition: border-color .18s var(--ease), box-shadow .18s var(--ease);\n  width: 100%;\n}\n.input::placeholder, .textarea::placeholder { color: var(--ink-3); }\n.input:focus, .select:focus, .textarea:focus {\n  outline: none; border-color: var(--teal);\n  box-shadow: 0 0 0 4px rgba(63,169,201,.14);\n}\n.textarea { resize: vertical; min-height: 110px; }\n.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }\n\n/* selectable chips (time / service) */\n.chips { display: flex; flex-wrap: wrap; gap: 10px; }\n.chip {\n  font: inherit; font-size: 14px; font-weight: 600; cursor: pointer;\n  padding: 10px 16px; border-radius: var(--r-pill);\n  border: 1.5px solid var(--line); background: #fff; color: var(--ink-2);\n  transition: all .16s var(--ease);\n}\n.chip:hover { border-color: var(--teal); color: var(--teal-700); }\n.chip.sel { background: var(--teal); border-color: var(--teal); color: #fff; }\n\n/* ============================================================\n   CTA band\n   ============================================================ */\n.cta-band {\n  position: relative; overflow: hidden;\n  background: linear-gradient(135deg, var(--teal) 0%, var(--teal-700) 100%);\n  border-radius: var(--r-xl);\n  padding: clamp(48px, 6vw, 76px);\n  color: #fff;\n}\n.cta-band h2 { color: #fff; }\n.cta-band p { color: rgba(255,255,255,.88); }\n.cta-band .blob {\n  position: absolute; border-radius: 50%; pointer-events: none;\n}\n.cta-band .blob.b1 { width: 320px; height: 320px; right: -80px; top: -120px; background: rgba(255,255,255,.10); }\n.cta-band .blob.b2 { width: 220px; height: 220px; right: 180px; bottom: -120px; background: var(--coral); opacity: .22; }\n\n/* ============================================================\n   Footer\n   ============================================================ */\n.site-footer { background: var(--ink); color: #cfe0e6; padding: 64px 0 32px; }\n.site-footer .brand-name { color: #fff; }\n.site-footer .brand-name b { color: var(--teal); }\n.footer-grid { display: grid; grid-template-columns: 1.6fr 1fr 1fr 1.2fr; gap: 40px; }\n.footer-grid h4 { color: #fff; font-size: 14px; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 18px; font-weight: 600; }\n.footer-grid a, .footer-grid li { color: #a9c2cb; font-size: 15px; }\n.footer-grid ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 11px; }\n.footer-grid a:hover { color: #fff; }\n.foot-about { color: #9fb8c1; font-size: 15px; line-height: 1.6; margin: 16px 0 22px; max-width: 320px; }\n.socials { display: flex; gap: 10px; }\n.socials a {\n  width: 40px; height: 40px; border-radius: 50%; display: grid; place-items: center;\n  background: rgba(255,255,255,.08); color: #cfe0e6; transition: background .2s var(--ease), color .2s var(--ease);\n}\n.socials a:hover { background: var(--teal); color: #fff; }\n.socials svg { width: 18px; height: 18px; }\n.foot-bottom {\n  margin-top: 48px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,.10);\n  display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap;\n  font-size: 14px; color: #8aa6b0;\n}\n.foot-bottom a { color: #8aa6b0; }\n.foot-bottom a:hover { color: #fff; }\n\n/* ============================================================\n   Misc components used across pages\n   ============================================================ */\n/* info row (hours / contact) */\n.info-row { display: flex; align-items: flex-start; gap: 14px; padding: 14px 0; }\n.info-row .ico { width: 42px; height: 42px; border-radius: 12px; background: var(--teal-tint); color: var(--teal-700); display: grid; place-items: center; flex: none; }\n.info-row .ico svg { width: 20px; height: 20px; }\n.info-row b { display: block; font-size: 15px; }\n.info-row span { color: var(--ink-2); font-size: 15px; }\n\n.hours-list { list-style: none; margin: 0; padding: 0; }\n.hours-list li { display: flex; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--line); font- ition: relative; }\n.hero-photo { width: 100%; height: auto; aspect-ratio: 4 / 4.6; box-shadow: var(--sh-lg); }\n.hero-badge {\n  position: absolute; left: -26px; bottom: 48px;\n  background: #fff; border-radius: var(--r); box-shadow: var(--sh-md);\n  padding: 14px 18px; display: flex; align-items: center; gap: 12px; max-width: 240px;\n}\n.hero-badge .hb-ico { width: 42px; height: 42px; border-radius: 12px; background: var(--teal-tint); display: grid; place-items: center; flex: none; }\n.hero-badge .hb-ico svg { width: 22px; height: 22px; }\n.hero-badge b { display: block; font-size: 15px; }\n.hero-badge span { font-size: 13px; color: var(--ink-3); }\n.hero-pill {\n  position: absolute; right: -14px; top: 34px;\n  background: #fff; border-radius: var(--r-pill); box-shadow: var(--sh-md);\n  padding: 11px 18px; display: flex; align-items: center; gap: 9px; font-size: 14px; font-weight: 600; color: var(--ink);\n}\n.hero-pill .hp-dot { width: 9px; height: 9px; border-radius: 50%; background: #34C77B; box-shadow: 0 0 0 4px rgba(52,199,123,.18); }\n\n/* reassurance strip */\n.strip { border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); background: #fff; }\n.strip-inner { display: flex; justify-content: space-between; gap: 24px; padding: 26px 0; flex-wrap: wrap; }\n.strip-item { display: flex; flex-direction: column; line-height: 1.3; }\n.strip-item b { font-size: 17px; color: var(--ink); }\n.strip-item span { font-size: 14px; color: var(--ink-3); }\n\n/* why grid */\n.why-grid { display: grid; grid-template-columns: 0.85fr 1.15fr; gap: clamp(36px, 5vw, 72px); align-items: center; }\n.why-grid .stack { margin-top: 0; }\n\n/* insurance */\n.insure { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: clamp(36px, 5vw, 64px); align-items: center; }\n.insure-points { display: flex; flex-direction: column; gap: 14px; margin-top: 26px; }\n.ip { display: flex; align-items: center; gap: 13px; font-size: 16px; font-weight: 500; color: var(--ink); }\n.ip-ico We keep same-day slots open so you're never left waiting in pain.<\u002Fp>\n        <span class=\"link-arrow\">Learn more <svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12h14M13 6l6 6-6 6\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ WHY LUMEN ============ -->\n<section class=\"section bg-tint\">\n  <div class=\"wrap\">\n    <div class=\"why-grid\">\n      <div class=\"sec-head reveal\">\n        <span class=\"eyebrow\">Why Lumen<\u002Fspan>\n        <h2 class=\"h2\">Care that feels calm from the moment you arrive<\u002Fh2>\n        <p class=\"lead\">We designed Lumen around how you actually feel about the dentist — and built everything to make it easier, gentler, and a little more human.<\u002Fp>\n        <a class=\"btn btn-teal\" href=\"new-patients.html\" style=\"margin-top:8px\">What to expect on your first visit<\u002Fa>\n      <\u002Fdiv>\n\n      <div class=\"grid grid-2\" style=\"gap:28px\">\n        <div class=\"pillar reveal\">\n          <span class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M12 20s-7-4.2-7-9.5A4 4 0 0 1 12 7a4 4 0 0 1 7 3.5C19 15.8 12 20 12 20Z\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <h3>Gentle Care<\u002Fh3>\n          <p>Soft techniques, plenty of breaks, and a team that listens. Tell us your worries — we'll go at your pace.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"pillar reveal\">\n          <span class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\"><rect x=\"4\" y=\"4\" width=\"16\" height=\"11\" rx=\"2\" stroke=\"currentColor\" stroke-width=\"1.7\"><\u002Frect><path d=\"M9 20h6M12 15v5\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"><\u002Fpath><path d=
